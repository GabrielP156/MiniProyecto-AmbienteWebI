<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/Soluciones.css">
    <link rel="stylesheet" href="css/estandar.css">
    <title>Document</title>
</head>

<body>
    <header>
        <div class="navbar">
            <div class="logo">
                <div class="logo-icon">&#10003;</div>
                GestaTarea
            </div>
            <button class="hamburguesa" id="hamburguesa">&#9776;</button>
            <div class="nav-links" id="navLinks">
                <a href="Gestatarea.html">Inicio</a>
                <a href="MisTareas.html" class="active">Mis Tareas</a>
                <a href="#">Registrar Tarea</a>
                <a href="Notas.html">Notas</a>
                <a href="#">Calculadora de Notas</a>
            </div>
        </div>
    </header>

    <main>
        <div class="main__center">
            <div class="text__container">
                <h1 class="h1__Solution">Mis Tareas</h1>
                <p class="main__context">Catalogo que carga la data de json y lo muestra en un buscador</p>
            </div>

            <div class="container__allSearch">
                <div class="search__container">
                    <section class="search">
                        <input type="text" class="search__main" id="searchInput" placeholder="Escribe para buscar...">
                    </section>
                    <div class="option__container">
                        <form action="" class="reset">
                            <select id="estado">
                            <option value="" selected disabled>Seleccione un estado</option>
                            <option value="pendiente">Pendiente</option>
                            <option value="en progreso">En progreso</option>
                            <option value="completada">Completada</option>
                        </select>

                        <select id="prioridad">
                            <option value="" selected disabled>Seleccione Prioridad</option>
                            <option value="Alta">Alta</option>
                            <option value="Media">Media</option>
                            <option value="Baja">Baja</option>
                        </select>
                        </form>
                        


                    </div>
                    <section class="search">
                        <button class="searchBtn">Buscar</button>
                        <button class="searchBtn limpiar">Limpiar</button>
                    </section>

                    <div class="estado__main search">
                        <div class="estado__funcional">
                            <p class="total center"><span class="informe blanco"></span>Total</p>
                        </div>
                        <div class="estado__funcional">
                            <p class="Pendientes center"><span class="informe rojo"></span> Pendientes</p>
                        </div>
                        <div class="estado__funcional">
                            <p class="En_progreso center"><span class="informe amarillo"></span> En Progeso</p>
                        </div>
                        <div class="estado__funcional">
                            <p class="completadas center"><span class="informe verde"></span> Completadas</p>
                        </div>

                    </div>
                </div>
                <div class="main_wrapper"></div>
            </div>

        </div>


        </div>

       
    </main>

</body>
<script src="JS_aplication/solution.js"></script>

</html>
